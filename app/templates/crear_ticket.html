{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex align-items-center mb-3">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary me-3"><i class="fas fa-arrow-left"></i> Volver</a>
            <h2 class="text-deep-blue m-0">Crear Nuevo Ticket</h2>
        </div>
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Título corto del problema</label>
                    <input type="text" name="titulo" class="form-control" maxlength="200" placeholder="Ej: No puedo acceder a mi cuenta" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Descripción detallada</label>
                    <textarea name="descripcion" class="form-control" rows="6" placeholder="Explica con detalle el problema que estás experimentando..." required></textarea>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-cyan fw-bold px-4"><i class="fas fa-paper-plane me-2"></i> Enviar Ticket</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
