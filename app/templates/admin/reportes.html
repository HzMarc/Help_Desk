{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-deep-blue m-0"><i class="fas fa-chart-pie me-2"></i>Reportes Globales</h2>
</div>

<div class="row">
    <!-- Resumen de Tickets -->
    <div class="col-md-3 mb-4">
        <div class="card shadow-sm h-100 text-center border-0" style="background-color: #f8f9fa;">
            <div class="card-body py-5">
                <i class="fas fa-ticket-alt fa-3x text-deep-blue mb-3"></i>
                <h1 class="display-4 fw-bold text-dark">{{ reportes.total }}</h1>
                <p class="text-muted text-uppercase fw-bold mb-0">Total Histórico</p>
            </div>
        </div>
    </div>
    
    <div class="col-md-9 mb-4">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-start border-primary border-5 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-2">Abiertos</h6>
                                <h2 class="mb-0 text-primary">{{ reportes.abiertos }}</h2>
                            </div>
                            <div class="bg-primary bg-opacity-10 rounded-circle p-3">
                                <i class="fas fa-envelope-open fa-2x text-primary"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-start border-warning border-5 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-2">En Progreso</h6>
                                <h2 class="mb-0 text-warning">{{ reportes.en_progreso }}</h2>
                            </div>
                            <div class="bg-warning bg-opacity-10 rounded-circle p-3">
                                <i class="fas fa-spinner fa-2x text-warning"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-start border-success border-5 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-2">Resueltos</h6>
                                <h2 class="mb-0 text-success">{{ reportes.resueltos }}</h2>
                            </div>
                            <div class="bg-success bg-opacity-10 rounded-circle p-3">
                                <i class="fas fa-check-circle fa-2x text-success"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-start border-secondary border-5 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase fw-bold mb-2">Cerrados</h6>
                                <h2 class="mb-0 text-secondary">{{ reportes.cerrados }}</h2>
                            </div>
                            <div class="bg-secondary bg-opacity-10 rounded-circle p-3">
                                <i class="fas fa-archive fa-2x text-secondary"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
