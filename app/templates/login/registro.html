{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x text-deep-blue mb-2"></i>
                <h2 class="text-deep-blue">Registro de Cliente</h2>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-cyan w-100 py-2 fw-bold"><i class="fas fa-check-circle me-2"></i>Crear Cuenta</button>
            </form>
            <div class="text-center mt-4">
                <p class="mb-0">¿Ya tienes cuenta? <a href="{{ url_for('main.login') }}" class="text-cyan fw-bold text-decoration-none">Inicia sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
